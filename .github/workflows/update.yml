name: Update Western Canada Internships

on:
  schedule:
    - cron: "0 8 * * *"  # Daily at 8:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write

jobs:
  update-spreadsheet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run fetch script
        run: python fetch_internships.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add western_canada_internships.xlsx
          git diff --cached --quiet || git commit -m "Update Western Canada internships spreadsheet $(date -u +%Y-%m-%d)"
          git push
